<title>Deep Catch</title>
<style>
  :root {
    --gold: #ffce4a;
    --gold-deep: #f0a500;
    --ink: #f3ece0;
    --ink-dim: #c3b49c;
    --panel: rgba(38, 26, 40, 0.9);
    --panel-edge: rgba(255, 214, 158, 0.22);
    --surface: #ffd9a0;
    --font: "Trebuchet MS", "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    color: var(--ink);
    background: #1a1226;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; }

  /* ---------- top HUD ---------- */
  .hud-top {
    position: relative;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: linear-gradient(rgba(40, 26, 44, 0.65), rgba(40, 26, 44, 0));
  }
  .tabs {
    display: flex;
    background: rgba(20, 12, 26, 0.5);
    border: 1px solid var(--panel-edge);
    border-radius: 999px;
    padding: 3px; gap: 2px;
  }
  .tab {
    font-family: var(--font); font-weight: 700; font-size: 13px;
    letter-spacing: 0.03em; color: var(--ink-dim);
    background: transparent; border: 0; border-radius: 999px;
    padding: 7px 15px; cursor: pointer;
    transition: color .18s, background .18s;
  }
  .tab[aria-selected="true"] { color: #3a2410; background: var(--gold); }

  .brand { flex: 1; text-align: center; line-height: 1.05; min-width: 0; overflow: hidden; }
  .brand b {
    font-size: clamp(13px, 4.2vw, 17px); letter-spacing: .06em; color: var(--surface); white-space: nowrap;
    text-shadow: 0 1px 6px rgba(0,0,0,.4);
  }
  .brand span {
    display: block; font-size: 9px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--ink-dim); margin-top: 1px;
  }
  @media (max-width: 460px) { .brand span { display: none; } }

  .gold-pill {
    display: flex; align-items: center; gap: 8px;
    background: rgba(20, 12, 26, 0.5);
    border: 1px solid rgba(255, 206, 74, .35);
    border-radius: 999px; padding: 7px 14px 7px 8px; flex: 0 0 auto;
  }
  .coin {
    width: 22px; height: 22px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffe9a0, var(--gold) 55%, var(--gold-deep));
    box-shadow: inset 0 0 0 2px rgba(240,165,0,.5);
    display: grid; place-items: center;
    font-size: 11px; font-weight: 800; color: #7a4b00;
  }
  .gold-pill b { font-size: 17px; font-variant-numeric: tabular-nums; }

  /* ---------- stage ---------- */
  .stage { position: relative; flex: 1; min-height: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }

  /* ---------- bottom bar ---------- */
  .hud-bottom {
    position: relative; z-index: 20;
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(rgba(26,18,38,0), #1a1226 60%);
  }
  .reach { flex: 0 0 auto; font-size: 11px; color: var(--ink-dim); letter-spacing: .04em; line-height: 1.5; }
  .reach b { color: var(--surface); font-size: 13px; }
  .catch-dots { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; align-content: center; }
  .dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid rgba(255,217,160,.4); background: transparent;
    transition: background .15s, border-color .15s, transform .15s;
  }
  .dot.on { background: var(--gold); border-color: var(--gold); transform: scale(1.12); }

  .btn {
    font-family: var(--font); font-weight: 800; letter-spacing: .04em;
    border: 0; border-radius: 14px; cursor: pointer;
    transition: transform .08s ease, filter .15s; flex: 0 0 auto;
  }
  .btn:active { transform: scale(.96); }
  .btn-cast {
    font-size: 16px; color: #3a2410; padding: 14px 30px;
    background: linear-gradient(#ffe07a, var(--gold) 60%, var(--gold-deep));
    box-shadow: 0 4px 0 #b9791b, 0 8px 18px rgba(0,0,0,.35);
  }
  .btn-cast:active { box-shadow: 0 1px 0 #b9791b; transform: translateY(3px) scale(.98); }
  .btn-cast.reeling {
    background: linear-gradient(#ffc59f, #e8895a 60%, #c05f34);
    box-shadow: 0 4px 0 #8a4020, 0 8px 18px rgba(0,0,0,.35); color: #3a1c0c;
  }
  .btn-shop { font-size: 14px; color: var(--ink); padding: 12px 18px;
    background: rgba(46, 30, 50, 0.85); border: 1px solid var(--panel-edge); }

  /* ---------- shop overlay ---------- */
  .overlay {
    position: absolute; inset: 0; z-index: 40; display: none;
    align-items: center; justify-content: center;
    background: rgba(14, 8, 20, .55); backdrop-filter: blur(3px); padding: 18px;
  }
  .overlay.open { display: flex; }
  .shop {
    width: 100%; max-width: 380px; background: var(--panel);
    border: 1px solid var(--panel-edge); border-radius: 22px; padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
    max-height: 86%; overflow-y: auto; overscroll-behavior: contain;
  }
  .shop h2 { font-size: 20px; letter-spacing: .02em; margin-bottom: 2px; }
  .shop .sub { font-size: 12px; color: var(--ink-dim); margin-bottom: 16px; }
  .up {
    display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 14px;
    background: rgba(20, 12, 26, .5); border: 1px solid rgba(255,217,160,.12); margin-bottom: 10px;
  }
  .up .ic { font-size: 24px; width: 34px; text-align: center; flex: 0 0 auto; }
  .up .body { flex: 1; min-width: 0; }
  .up .body b { font-size: 14px; }
  .up .body p { font-size: 11px; color: var(--ink-dim); margin-top: 2px; }
  .up .buy {
    font-family: var(--font); font-weight: 800; font-size: 13px;
    color: #3a2410; background: var(--gold); border: 0; border-radius: 10px;
    padding: 9px 12px; cursor: pointer; flex: 0 0 auto;
    display: flex; align-items: center; gap: 5px;
    transition: transform .08s, filter .15s;
  }
  .up .buy:active { transform: scale(.95); }
  .up .buy:disabled { background: rgba(255,217,160,.16); color: var(--ink-dim); cursor: not-allowed; }
  .up .buy .c { font-size: 11px; }
  .shop .close {
    width: 100%; margin-top: 6px; font-family: var(--font); font-weight: 700; font-size: 14px;
    color: var(--ink-dim); background: transparent;
    border: 1px solid var(--panel-edge); border-radius: 12px; padding: 11px; cursor: pointer;
  }

  .banner {
    position: absolute; top: 16%; left: 50%; z-index: 30;
    transform: translate(-50%, -8px);
    background: linear-gradient(#ffe07a, var(--gold-deep));
    color: #5a3600; font-weight: 800; letter-spacing: .04em;
    padding: 12px 26px; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.4);
    opacity: 0; pointer-events: none; text-align: center;
  }
  .banner.show { animation: pop 2s cubic-bezier(.22,.61,.36,1) forwards; }
  .banner b { display: block; font-size: 20px; }
  .banner span { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; }
  @keyframes pop {
    0% { opacity: 0; transform: translate(-50%, 6px) scale(.9); }
    15% { opacity: 1; transform: translate(-50%, -10px) scale(1.04); }
    82% { opacity: 1; transform: translate(-50%, -10px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -26px) scale(1); }
  }

  .hint {
    position: absolute; left: 50%; top: 46%; z-index: 15; transform: translateX(-50%);
    color: rgba(243,236,224,.8); font-size: 13px; letter-spacing: .03em;
    text-align: center; pointer-events: none; text-shadow: 0 2px 8px rgba(0,0,0,.5);
    transition: opacity .4s;
  }

  @media (prefers-reduced-motion: reduce) { .banner.show { animation-duration: 1.2s; } }
</style>

<div id="app">
  <div class="hud-top">
    <div class="tabs" role="tablist">
      <button class="tab" role="tab" id="tab-fish" aria-selected="true">Fishing</button>
      <button class="tab" role="tab" id="tab-room" aria-selected="false">Room</button>
    </div>
    <div class="brand"><b>Deep&nbsp;Catch</b><span>a cozy little fishing trip</span></div>
    <div class="gold-pill"><span class="coin">$</span><b id="gold">0</b></div>
    <button id="mute" aria-label="Toggle sound" style="border:0;cursor:pointer;background:rgba(20,12,26,.5);border:1px solid var(--panel-edge);border-radius:999px;width:36px;height:36px;font-size:15px;flex:0 0 auto">🔊</button>
  </div>

  <div class="stage" id="stage">
    <canvas id="cv"></canvas>
    <div class="hint" id="hint">Move to aim &middot; tap the water or press Cast to drop your hook</div>
    <button id="quest" aria-label="Open grandpa's journal" style="position:absolute;top:8px;left:10px;z-index:16;max-width:72%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font);font-weight:700;font-size:12px;color:var(--ink);background:rgba(20,12,26,.55);border:1px solid var(--panel-edge);border-radius:999px;padding:8px 13px;cursor:pointer;text-align:left"></button>
    <div class="overlay" id="note-overlay">
      <div class="shop" style="max-width:340px">
        <h2>📜 Grandpa's Journal</h2>
        <p class="sub" id="note-story" style="font-size:13.5px;line-height:1.55;color:var(--ink);margin:10px 0 14px;font-style:italic"></p>
        <div class="up"><div class="ic">🎯</div><div class="body"><b id="note-goal"></b><p>reward: <span id="note-reward" style="color:var(--gold);font-weight:800"></span></p></div></div>
        <button class="close" id="note-close">Back to the water</button>
      </div>
    </div>
    <div class="banner" id="banner"><b>New species!</b><span>added to your aquarium</span></div>
    <div class="overlay" id="overlay">
      <div class="shop">
        <h2>Tackle Shop</h2>
        <p class="sub">Sell your catch, spend the gold — every upgrade comes from the water.</p>
        <div id="shop-list"></div>
        <button class="close" id="shop-close">Back to the water</button>
      </div>
    </div>
  </div>

  <div class="hud-bottom" id="bottom-fish">
    <div class="reach">Line reach<br><b id="reach-pct">16%</b></div>
    <div class="catch-dots" id="dots"></div>
    <button class="btn btn-shop" id="btn-shop">Shop</button>
    <button class="btn btn-cast" id="btn-cast">Cast</button>
  </div>
</div>

<script>

  "use strict";
  const cv = document.getElementById("cv");

  // ---------- persistent state (single currency: gold) ----------
  const SAVE_KEY = "deepcatch.v3";

    view: "fish",
    gold: 0,
    lineUp: 0, netUp: 0, reelUp: 0, hookUp: 0,
    collection: {},   // speciesId -> count caught
    pond: 0, pondsOwned: [0], tank: 0, muted: false,
  };
  function load() {
    try {
      // v2/v1 saves carry over: gold, gear levels, collection
      const raw = localStorage.getItem(SAVE_KEY) || localStorage.getItem("deepcatch.v2") || localStorage.getItem("deepcatch.v1");
      if (raw) {
        const s = JSON.parse(raw);
        state.gold = s.gold || 0;
        state.lineUp = s.lineUp || 0;
        state.netUp = s.netUp || 0;
        state.reelUp = s.reelUp || 0;
        state.hookUp = s.hookUp || 0;
        state.collection = s.collection || {};
        state.pondsOwned = Array.isArray(s.pondsOwned) && s.pondsOwned.includes(0) ? s.pondsOwned : [0];
        state.pond = state.pondsOwned.includes(s.pond) ? s.pond : 0;
        state.tank = Math.min(2, s.tank || 0);
        state.muted = !!s.muted;
        state.qi = s.qi || 0;
        if (s.wv !== 2) { // older builds had 4 waters — remap to the 7-water ladder
          const map = { 0: 0, 1: 1, 2: 3, 3: 5 };
          state.pondsOwned = state.pondsOwned.map(i => map[i] !== undefined ? map[i] : 0);
          if (!state.pondsOwned.includes(0)) state.pondsOwned.push(0);
          state.pond = map[s.pond] !== undefined ? map[s.pond] : 0;
          if (!state.pondsOwned.includes(state.pond)) state.pond = 0;
          state._rescanQuests = true;
        }
      }
    } catch (e) {}
  }
  function save() {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify({
      gold: state.gold, lineUp: state.lineUp, netUp: state.netUp,
      reelUp: state.reelUp, hookUp: state.hookUp, collection: state.collection,
      pond: state.pond, pondsOwned: state.pondsOwned, tank: state.tank, muted: state.muted, qi: state.qi, wv: 2,

  function makeFish() {
    const pool = SPECIES.filter(s => s.pond === state.pond);

    let r = Math.random() * total, picked = pool[0];
    for (const s of pool) { if ((r -= s.rare) <= 0) { picked = s; break; } }
    const depth = rand(picked.minD, picked.maxD);
    const dir = Math.random() < 0.5 ? 1 : -1;
    return {
      s: picked, x: dir === 1 ? -40 : W + 40,
      y: surfaceY() + depth * worldDepth(),
      vx: dir * rand(18, 46) * (1 + picked.minD) / (picked.big || 1) * (picked.body === "jelly" ? 0.35 : 1),
      wob: Math.random() * Math.PI * 2, caught: false, ox: 0, oy: 0,
    };
  }

  function resolveCatch() {
    const got = hook.caught;
    hook.caught = []; hook.state = "idle";
    fish = fish.filter(f => !f.caught); // free their slots so the sea restocks
    if (got.length) {
      let sum = 0; const news = [];
      for (const f of got) {
        sum += Math.round(f.s.gold * sellMult());
        if (!state.collection[f.s.id]) news.push(f.s.name);
        state.collection[f.s.id] = (state.collection[f.s.id] || 0) + 1;

  function tryCatch() {
    if (hook.caught.length >= catchLimit()) return;
    for (const f of fish) {
      if (f.caught || f.prowl) continue; // a lunging predator can't be hooked — dodge it
      const dx = f.x - hook.x, dy = f.y - hook.y;
      if (dx * dx + dy * dy < (f.s.size * 0.85 + 13) ** 2) {
        f.caught = true; f.prowl = false; f.ox = dx * 0.3; f.oy = f.s.size * 0.5;
        hook.caught.push(f);
        floatText(f.x, f.y - f.s.size, f.s.name, f.s.color);

  const Snd = {
    ac: null, oscs: [], gain: null, lp: null, mood: -1, plinkTimer: 0,
    unlock() {
      if (this.ac || state.muted) return;
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        this.ac = new AC();
        this.gain = this.ac.createGain(); this.gain.gain.value = 0;
        this.lp = this.ac.createBiquadFilter(); this.lp.type = "lowpass"; this.lp.frequency.value = 640;
        this.gain.connect(this.lp); this.lp.connect(this.ac.destination);
        for (const f of MOODS[0].chord) {
          const o = this.ac.createOscillator(), og = this.ac.createGain();
          o.type = "triangle"; o.frequency.value = f; og.gain.value = 0.33;
          o.connect(og); og.connect(this.gain); o.start();
          this.oscs.push(o);
        }
        this.gain.gain.linearRampToValueAtTime(0.035, this.ac.currentTime + 3);
        this.mood = -1;
        this.setMood(state.pond);
        this.schedulePlink();
      } catch (e) {}
    },
    setMood(p) {
      if (p === this.mood) return;
      this.mood = p;
      if (!this.ac) return;
      const t = this.ac.currentTime, M = MOODS[p];
      this.oscs.forEach((o, i) => { try { o.frequency.exponentialRampToValueAtTime(M.chord[i], t + 3.5); } catch (e) {} });
      try { this.lp.frequency.linearRampToValueAtTime(M.lp, t + 3.5); } catch (e) {}
      if (p === 5) this.blip("boom");
      else if (p === 6) { this.tone(65.4, 2.4, 0.05, "sine"); this.tone(98, 2.0, 0.03, "sine", 0.15); }
      this.schedulePlink(); // re-pace the ambience to the new water
    },
    schedulePlink() {
      clearTimeout(this.plinkTimer);
      const M = MOODS[Math.max(0, this.mood)];
      this.plinkTimer = setTimeout(() => {
        if (this.ac && !state.muted && document.visibilityState === "visible") {
          const MM = MOODS[Math.max(0, this.mood)]; // resolve fresh — the water may have changed since arming
          const f = MM.scale[Math.floor(Math.random() * MM.scale.length)];
          this.tone(f, 0.9, 0.014, this.mood >= 5 ? "sine" : "triangle");
        }
        this.schedulePlink();
      }, (M.plink[0] + Math.random() * (M.plink[1] - M.plink[0])) * 1000);
    },
    tone(f, dur, vol, type, when) {
      if (!this.ac || state.muted) return;
      try {
        const t = this.ac.currentTime + (when || 0);
        const o = this.ac.createOscillator(), g = this.ac.createGain();
        o.type = type || "sine"; o.frequency.value = f;
        g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g); g.connect(this.ac.destination);
        o.start(t); o.stop(t + dur);
      } catch (e) {}
    },
    blip(kind) {
      if (!this.ac || state.muted) return;
      if (kind === "splash") { this.tone(320, 0.12, 0.02, "triangle"); this.tone(180, 0.2, 0.015, "sine", 0.03); }
      else if (kind === "pop") this.tone(660, 0.07, 0.02, "sine");
      else if (kind === "coin") { this.tone(880, 0.06, 0.018, "square"); this.tone(1318.5, 0.09, 0.014, "square", 0.06); }
      else if (kind === "bite") { this.tone(110, 0.16, 0.05, "sawtooth"); this.tone(72, 0.22, 0.04, "sawtooth", 0.05); }
      else if (kind === "quest") { [523.3, 659.3, 784].forEach((f, i) => this.tone(f, 0.14, 0.02, "triangle", i * 0.09)); }
      else if (kind === "boom") { this.tone(48, 1.6, 0.09, "sine"); this.tone(36, 2.2, 0.06, "sine", 0.1); }
    },
    setMuted(m) {
      state.muted = m;
      if (this.ac) this.ac[m ? "suspend" : "resume"]();
      else if (!m) this.unlock();
    },
  };

  const Quests = {
    cur() { return QUESTS[state.qi] || null; },
    // event goals arrive from gameplay; state goals are re-checked after any change
    event(kind, n, clean) {
      const q = this.cur(); if (!q) return;
      if (kind === "stolen" && q.goal.stolen) this.complete();
      else if (kind === "haul") {
        if (q.goal.haul && n >= q.goal.haul) this.complete();
        else if (q.goal.clean && n >= q.goal.clean && clean) this.complete();
      }
    },
    met(q) {
      const g = q.goal, col = state.collection;
      if (g.total) return Object.values(col).reduce((a, b) => a + b, 0) >= g.total;
      if (g.species) return (col[g.species] || 0) >= g.n;
      if (g.gear) return state[g.gear] >= g.n;
      if (g.pond !== undefined) return state.pondsOwned.includes(g.pond);
      if (g.tank !== undefined) return state.tank >= g.tank;
      if (g.dex) return Object.keys(col).length >= g.dex;
      return false; // event goals never pass a state check
    },
    check() {
      let q = this.cur();
      while (q && this.met(q)) { this.complete(); q = this.cur(); }
      syncQuest();
    },
    rescan() { // after a quest-list change: fast-forward past already-met story beats (no rewards)
      const isEvent = i => { const g = QUESTS[i].goal; return !!(g.haul || g.stolen || g.clean); };
      let qi = 0;
      while (qi < QUESTS.length) {
        if (this.met(QUESTS[qi])) { qi++; continue; }
        if (isEvent(qi)) {
          // a veteran who already met a LATER state goal is clearly past this event beat
          let laterMet = false;
          for (let j = qi + 1; j < QUESTS.length; j++) if (!isEvent(j)) { laterMet = this.met(QUESTS[j]); break; }
          if (laterMet) { qi++; continue; }
        }
        break;
      }
      state.qi = qi;
    },
    complete() {
      const q = this.cur(); if (!q) return;
      state.gold += q.reward;
      state.qi++;

    b.querySelector("b").textContent = title;
    b.querySelector("span").textContent = sub;
    b.classList.remove("show"); void b.offsetWidth; b.classList.add("show");
    clearTimeout(bannerTimer);
    bannerTimer = setTimeout(() => b.classList.remove("show"), 2000);
  }
  castBtn.addEventListener("click", cast);

  function setView(v) {
    state.view = v;
    el("tab-fish").setAttribute("aria-selected", v === "fish");
    el("tab-room").setAttribute("aria-selected", v === "room");
    el("bottom-fish").style.display = v === "fish" ? "flex" : "none";
    if (v === "room") {
      for (const f of hook.caught) f.caught = false; // the ones on the line slip free
      hook.state = "idle"; hook.caught = [];
      for (const b of bubbles) b.y = rand(H * 0.2, H * 0.75); // bubbles re-seed into tank space
      rebuildTank();
    }
    syncHud();
  }
  el("tab-fish").addEventListener("click", () => setView("fish"));
  el("tab-room").addEventListener("click", () => setView("room"));

  // ---------- shop (gold is the only currency; tuned to ~72h to 100%) ----------
  const overlay = el("overlay"), shopList = el("shop-list");
  const UPGRADES = [
    { key:"lineUp", ic:"🎣", name:"Longer Line", desc:"Reach deeper, richer water",
      cost:(n)=>Math.round(40 * Math.pow(1.36, n)),  max:30 },
    { key:"netUp",  ic:"🧺", name:"Bigger Net",  desc:"+1 fish per cast",
      cost:(n)=>Math.round(140 * Math.pow(1.62, n)), max:11 },
    { key:"reelUp", ic:"⚙️", name:"Faster Reel", desc:"Reel in quicker",
      cost:(n)=>Math.round(90 * Math.pow(1.55, n)),  max:10 },
    { key:"hookUp", ic:"✨", name:"Golden Hook", desc:"+8% sell value on every fish",
      cost:(n)=>Math.round(120 * Math.pow(1.60, n)), max:30 },
  ];
  function shopRow(ic, title, sub, btnHtml) {
    const row = document.createElement("div");
    row.className = "up";
    row.innerHTML = `<div class="ic">${ic}</div><div class="body"><b>${title}</b><p>${sub}</p></div>${btnHtml}`;
    return row;
  }
  function sectionHead(txt) {
    const h = document.createElement("p");
    h.style.cssText = "font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin:14px 2px 8px;font-weight:700";
    h.textContent = txt;
    return h;
  }
  const priceBtn = (price, afford) =>
    `<button class="buy" ${afford ? "" : "disabled"}><span class="c">$</span>${price.toLocaleString()}</button>`;
  function renderShop() {
    shopList.innerHTML = "";
    shopList.appendChild(sectionHead("Gear"));
    for (const u of UPGRADES) {
      const n = state[u.key], maxed = n >= u.max, cost = u.cost(n);
      const btn = maxed ? `<button class="buy" disabled>Maxed</button>` : priceBtn(cost, state.gold >= cost);
      const row = shopRow(u.ic, `${u.name} <span style="color:var(--ink-dim);font-weight:600">Lv ${n}/${u.max}</span>`, u.desc, btn);
      if (!maxed) row.querySelector(".buy").addEventListener("click", () => {
        if (state.gold < cost) return;
        state.gold -= cost; state[u.key]++; save(); renderShop(); syncHud(); Quests.check();
      });
      shopList.appendChild(row);
    }
    shopList.appendChild(sectionHead("Waters"));
    PONDS.forEach((p, i) => {
      const owned = state.pondsOwned.includes(i), here = state.pond === i;
      const btn = here ? `<button class="buy" disabled>Here</button>`
        : owned ? `<button class="buy">Sail</button>`
        : priceBtn(p.price, state.gold >= p.price);
      const row = shopRow(["🏡","⛩️","🌿","🌊","🧊","🕳️","🏮"][i], p.name, p.sub, btn);
      if (!here) row.querySelector(".buy").addEventListener("click", () => {
        if (!owned) {
          if (state.gold < p.price) return;
          state.gold -= p.price; state.pondsOwned.push(i);
        }
        state.pond = i; fish = []; hook.state = "idle"; hook.caught = [];
        Snd.setMood(i);
        save(); renderShop(); syncHud(); syncBrand();
        Quests.check();
      });
      shopList.appendChild(row);
    });
    shopList.appendChild(sectionHead("Aquarium"));
    TANKS.forEach((t, i) => {
      const ownedT = state.tank >= i, next = i === state.tank + 1;
      const btn = ownedT ? `<button class="buy" disabled>${i === state.tank ? "Yours" : "Owned"}</button>`
        : next ? priceBtn(t.price, state.gold >= t.price)
        : `<button class="buy" disabled>Locked</button>`;
      const row = shopRow(["🫙","🪸","🌑"][i], t.name, t.sub, btn);
      if (next) row.querySelector(".buy").addEventListener("click", () => {
        if (state.gold < t.price) return;
        state.gold -= t.price; state.tank = i; rebuildTank();
        save(); renderShop(); syncHud(); Quests.check();
      });
      shopList.appendChild(row);
    });
  }
  el("btn-shop").addEventListener("click", () => { renderShop(); overlay.classList.add("open"); });
  el("shop-close").addEventListener("click", () => overlay.classList.remove("open"));
  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.remove("open"); });

  // ---------- aquarium (bigger tanks welcome bigger fish) ----------
  const tankAllows = s => (s.big || 1) <= TANKS[state.tank].max;
  function rebuildTank() {
    tank = [];
    for (const id in state.collection) {
      const s = byId[id]; if (!s || !tankAllows(s)) continue;
      const swimmers = Math.min(3, 1 + Math.floor(state.collection[id] / 4));
      for (let i = 0; i < swimmers; i++)
        tank.push({ s, x: rand(60, 400), y: rand(0.2, 0.85),
          vx: (Math.random() < .5 ? 1 : -1) * rand(14, 34) / (s.big || 1), wob: Math.random() * Math.PI * 2 });
    }
  }
  rebuildTank();

  // ---------- ambient decor (fraction-based so it scales) ----------
  const STARS = Array.from({ length: 46 }, () => ({ fx: rand(0,1), fy: rand(0,0.62), ph: rand(0,6.28), r: rand(0.6,1.7) }));
  const CLOUDS = Array.from({ length: 4 }, (_, i) => ({ fx: rand(0.05,0.9), fy: rand(0.2,0.7), s: rand(0.7,1.3), drift: rand(2,6) }));

  // ---------- resize ----------
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = stage.clientWidth; H = stage.clientHeight;
    cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    if (!hook.x) { hook.x = W / 2; hook.tx = W / 2; }
    hook.x = clampX(hook.x); hook.tx = clampX(hook.tx);
    ensureFish();
  }
  new ResizeObserver(resize).observe(stage);
  resize();

  // ---------- drawing ----------
  function drawSky() {
    const sY = surfaceY(), P = pondNow();
    const sky = ctx.createLinearGradient(0, 0, 0, sY);
    sky.addColorStop(0, P.sky[0]);
    sky.addColorStop(0.5, P.sky[1]);
    sky.addColorStop(0.8, P.sky[2]);
    sky.addColorStop(1, P.sky[3]);
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, sY);

    // stars (upper sky)
    for (const st of STARS) {
      const y = st.fy * sY;
      const tw = 0.5 + 0.5 * Math.sin(T * 2 + st.ph);
      ctx.globalAlpha = (1 - st.fy / 0.62) * tw * 0.9;
      ctx.fillStyle = "#fff7e6";
      ctx.beginPath(); ctx.arc(st.fx * W, y, st.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (P.aurora) { // the sky dances green over the fjord
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      const AC = ["rgba(110,255,180,.09)", "rgba(140,200,255,.07)", "rgba(200,140,255,.06)"];
      for (let b = 0; b < 3; b++) {
        ctx.fillStyle = AC[b];
        ctx.beginPath();
        for (let x = 0; x <= W; x += 24) {
          const y = sY * (0.12 + b * 0.1) + Math.sin(x * 0.012 + T * 0.35 + b * 2.1) * sY * 0.09;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        for (let x = W; x >= 0; x -= 24) {
          const y = sY * (0.34 + b * 0.1) + Math.sin(x * 0.011 + T * 0.3 + b * 1.7) * sY * 0.07;
          ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }

    // low sun (a pale, distant moon over the darkest waters)
    const sunX = W * 0.76, sunY = sY * 0.82, sunR = Math.max(18, sY * 0.16);
    const glow = ctx.createRadialGradient(sunX, sunY, sunR * 0.4, sunX, sunY, sunR * 4);
    glow.addColorStop(0, P.sunGlow); glow.addColorStop(1, "rgba(255,214,150,0)");
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(sunX, sunY, sunR * 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = P.sun; ctx.beginPath(); ctx.arc(sunX, sunY, sunR * (P.sunK || 1), 0, Math.PI * 2); ctx.fill();

    // soft clouds
    for (const c of CLOUDS) {
      const cx = ((c.fx * W + T * c.drift) % (W + 160)) - 80;
      const cy = c.fy * sY, s = c.s;
      ctx.fillStyle = P.cloud;
      for (const [dx, dy, r] of [[0,0,20],[22,4,16],[-20,5,15],[8,-8,15]]) {
        ctx.beginPath(); ctx.ellipse(cx + dx*s, cy + dy*s, r*s, r*0.7*s, 0, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  function drawWater() {
    const sY = surfaceY(), P = pondNow();
    // each stratum a shade darker than the one above it
    const D = worldDepth();
    const g = ctx.createLinearGradient(0, sY, 0, sY + D);
    g.addColorStop(0, P.water[0]);
    g.addColorStop(0.16, P.water[1]);
    g.addColorStop(0.44, P.water[2]);
    g.addColorStop(0.72, P.water[3]);
    g.addColorStop(1, P.water[4]);
    ctx.fillStyle = g; ctx.fillRect(0, sY, W, D + 40);

    // surface reflection in the water's own light
    const warm = "rgba(" + P.shine + ",";
    const refl = ctx.createLinearGradient(0, sY, 0, sY + 40);
    refl.addColorStop(0, warm + ".3)"); refl.addColorStop(1, warm + "0)");
    ctx.fillStyle = refl; ctx.fillRect(0, sY, W, 40);
    ctx.fillStyle = warm + ".45)";
    ctx.fillRect(0, sY - 1, W, 2);

    if (P.embers) { // warm sparks rise through the dark — a hearth at the bottom of the world
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      for (let i = 0; i < 18; i++) {
        const spd = 8 + (i * 13) % 11;
        const ey = sY + worldDepth() - ((T * spd + i * 137) % worldDepth());
        const ex2 = ((i * 197) % W) + Math.sin(T * 0.5 + i) * 14;
        const a = 0.25 + 0.2 * Math.sin(T * 1.4 + i * 2.2);
        ctx.globalAlpha = Math.max(0, a);
        ctx.fillStyle = i % 3 ? "#ffb96b" : "#ff8a5e";
        ctx.beginPath(); ctx.arc(ex2, ey, 1.4 + (i * 7) % 3 * 0.5, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = Math.max(0, a * 0.35);
        ctx.beginPath(); ctx.arc(ex2, ey, 4 + (i * 7) % 3, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore(); ctx.globalAlpha = 1;
    }

    // something enormous passes, far below
    if (P.shadow) {
      const per = 26, tm = T % per;
      if (tm < 12) {
        const leg = tm / 12, ltr = Math.floor(T / per) % 2 === 0;
        const lx = W * (ltr ? -0.35 + 1.7 * leg : 1.35 - 1.7 * leg);
        const ly = sY + worldDepth() * 0.85 + Math.sin(leg * Math.PI * 2) * 20;
        ctx.save();
        ctx.globalAlpha = 0.16 + 0.08 * Math.sin(leg * Math.PI);
        ctx.fillStyle = P.shadow === "warm" ? "#0a0504" : "#000208";
        ctx.translate(lx, ly); ctx.scale(ltr ? 1 : -1, 1);
        ctx.beginPath(); ctx.ellipse(0, 0, 130, 30, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-115, 0); ctx.lineTo(-180, -26); ctx.lineTo(-180, 26); ctx.closePath(); ctx.fill();
        if (P.shadow === "warm") { // the Old Lantern's light, far off in the black
          const lg = ctx.createRadialGradient(95, -8, 2, 95, -8, 60);
          lg.addColorStop(0, "rgba(255,185,107,.5)"); lg.addColorStop(1, "rgba(255,185,107,0)");
          ctx.globalAlpha = 0.5 + 0.2 * Math.sin(leg * Math.PI);
          ctx.fillStyle = lg; ctx.beginPath(); ctx.arc(95, -8, 60, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
      }
    }

    // max-reach shimmer
    const mY = maxDepthY();
    ctx.save();
    ctx.strokeStyle = "rgba(255,224,170,.5)"; ctx.setLineDash([7, 9]); ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(0, mY); ctx.lineTo(W, mY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "rgba(255,224,170,.8)"; ctx.font = "600 10px " + FONT();
    ctx.textAlign = "right"; ctx.fillText("MAX REACH", W - 10, mY - 6); ctx.textAlign = "left";
    ctx.restore();
  }

  // ---------- signature silhouettes: the big ones carry their own dread ----------
  function drawShark(g, s, wob) {
    const S = s.size, darker = shade(s.color, -0.3), belly = shade(s.color, 0.5);
    const tw = Math.sin(wob) * S * 0.12;
    // crescent tail
    g.fillStyle = darker;
    g.beginPath();
    g.moveTo(-S * 0.85, tw * 0.5);
    g.quadraticCurveTo(-S * 1.35, tw - S * 0.55, -S * 1.2, tw - S * 0.62);
    g.quadraticCurveTo(-S * 1.05, tw - S * 0.1, -S * 1.18, tw + S * 0.42);
    g.quadraticCurveTo(-S * 1.3, tw + S * 0.48, -S * 0.85, tw * 0.5);
    g.fill();
    // torpedo body: sharp snout, muscled back
    g.fillStyle = s.color;
    g.beginPath();
    g.moveTo(S * 1.05, -S * 0.02);
    g.quadraticCurveTo(S * 0.55, -S * 0.42, -S * 0.2, -S * 0.38);
    g.quadraticCurveTo(-S * 0.75, -S * 0.3, -S * 0.95, tw * 0.4);
    g.quadraticCurveTo(-S * 0.7, S * 0.22, -S * 0.1, S * 0.3);
    g.quadraticCurveTo(S * 0.6, S * 0.34, S * 1.05, -S * 0.02);
    g.fill();
    // pale belly
    g.fillStyle = belly; g.globalAlpha *= 0.55;
    g.beginPath();
    g.moveTo(S * 0.95, S * 0.02);
    g.quadraticCurveTo(S * 0.4, S * 0.34, -S * 0.3, S * 0.28);
    g.quadraticCurveTo(S * 0.3, S * 0.14, S * 0.95, S * 0.02);
    g.fill(); g.globalAlpha /= 0.55;
    // tall dorsal
    g.fillStyle = darker;
    g.beginPath();
    g.moveTo(S * 0.05, -S * 0.32);
    g.quadraticCurveTo(-S * 0.05, -S * 0.85, -S * 0.3, -S * 0.78);
    g.lineTo(-S * 0.32, -S * 0.3);
    g.closePath(); g.fill();
    // pectoral
    g.beginPath();
    g.moveTo(S * 0.15, S * 0.2);
    g.quadraticCurveTo(-S * 0.1, S * 0.62, -S * 0.32, S * 0.55);
    g.lineTo(-S * 0.05, S * 0.24);
    g.closePath(); g.fill();
    // gill slits
    g.strokeStyle = darker; g.lineWidth = Math.max(1, S * 0.035); g.lineCap = "round";
    for (let i = 0; i < 3; i++) {
      g.beginPath(); g.arc(S * (0.32 - i * 0.09), -S * 0.02, S * 0.16, -0.5, 0.5); g.stroke();
    }
    if (s.hammer) {
      // the door-knocker head
      g.fillStyle = s.color;
      g.beginPath(); g.ellipse(S * 0.95, -S * 0.02, S * 0.16, S * 0.42, 0, 0, Math.PI * 2); g.fill();
      g.fillStyle = "#0c1218";
      g.beginPath(); g.arc(S * 0.98, -S * 0.36, S * 0.06, 0, Math.PI * 2); g.fill();
      g.beginPath(); g.arc(S * 0.98, S * 0.32, S * 0.06, 0, Math.PI * 2); g.fill();
    } else {
      // flat predator eye
      g.fillStyle = "#0c1218";
      g.beginPath(); g.arc(S * 0.62, -S * 0.14, S * 0.06, 0, Math.PI * 2); g.fill();
      // a hint of grin
      g.strokeStyle = "rgba(10,16,22,.6)"; g.lineWidth = Math.max(1, S * 0.04);
      g.beginPath(); g.moveTo(S * 0.95, S * 0.08); g.quadraticCurveTo(S * 0.7, S * 0.18, S * 0.45, S * 0.16); g.stroke();
    }
  }
  function drawRay(g, s, wob) {
    const S = s.size, flap = Math.sin(wob) * 0.35;
    if (s.glow) {
      const gl = g.createRadialGradient(0, 0, 2, 0, 0, S * 1.6);
      gl.addColorStop(0, s.glow + "66"); gl.addColorStop(1, "rgba(0,0,0,0)");
      g.fillStyle = gl; g.beginPath(); g.arc(0, 0, S * 1.6, 0, Math.PI * 2); g.fill();
    }
    // wings mid-flap
    g.fillStyle = s.color;
    g.beginPath();
    g.moveTo(S * 0.75, 0);
    g.quadraticCurveTo(0, -S * (0.75 + flap), -S * 0.55, -S * (0.35 + flap) * 0.5);
    g.quadraticCurveTo(-S * 0.35, 0, -S * 0.55, S * (0.35 - flap) * 0.5);
    g.quadraticCurveTo(0, S * (0.75 - flap), S * 0.75, 0);
    g.fill();
    // whip tail
    g.strokeStyle = shade(s.color, -0.25); g.lineWidth = Math.max(1.2, S * 0.06); g.lineCap = "round";
    g.beginPath(); g.moveTo(-S * 0.5, 0);
    g.quadraticCurveTo(-S * 1.1, Math.sin(wob * 1.4) * S * 0.25, -S * 1.5, Math.sin(wob) * S * 0.35);
    g.stroke();
    // moon-speckles
    g.fillStyle = "rgba(240,246,255,.7)";
    for (const [px, py] of [[0.1, -0.2], [-0.2, 0.1], [0.25, 0.12], [-0.05, -0.38]]) {
      g.beginPath(); g.arc(S * px, S * py, S * 0.045, 0, Math.PI * 2); g.fill();
    }
    // gentle eyes
    g.fillStyle = "#122029";
    g.beginPath(); g.arc(S * 0.5, -S * 0.08, S * 0.055, 0, Math.PI * 2); g.fill();
  }
  function drawSquidBody(g, s, wob) {
    const S = s.size, sway = Math.sin(wob) * S * 0.1;
    if (s.glow) {
      const gl = g.createRadialGradient(0, 0, 2, 0, 0, S * 1.7);
      gl.addColorStop(0, s.glow + "88"); gl.addColorStop(1, "rgba(0,0,0,0)");
      g.fillStyle = gl; g.beginPath(); g.arc(0, 0, S * 1.7, 0, Math.PI * 2); g.fill();
    }
    // tentacles trail behind
    g.strokeStyle = shade(s.color, -0.15); g.lineWidth = Math.max(1.4, S * 0.09); g.lineCap = "round";
    for (let i = 0; i < 5; i++) {
      const off = (i - 2) * S * 0.14, ph = wob * 1.3 + i;
      g.beginPath(); g.moveTo(-S * 0.3, off * 0.5);
      g.quadraticCurveTo(-S * 0.75, off + Math.sin(ph) * S * 0.18, -S * 1.05, off * 1.3 + Math.cos(ph) * S * 0.22);
      g.stroke();
    }
    // mantle (pointed cap forward)
    const bg2 = g.createLinearGradient(0, -S * 0.5, 0, S * 0.5);
    bg2.addColorStop(0, s.color); bg2.addColorStop(1, shade(s.color, 0.35));
    g.fillStyle = bg2;
    g.beginPath();
    g.moveTo(S * 0.95, sway * 0.3);
    g.quadraticCurveTo(S * 0.45, -S * 0.5 + sway, -S * 0.25, -S * 0.34 + sway);
    g.quadraticCurveTo(-S * 0.45, sway, -S * 0.25, S * 0.34 + sway);
    g.quadraticCurveTo(S * 0.45, S * 0.5 + sway, S * 0.95, sway * 0.3);
    g.fill();
    // side fin frill
    g.fillStyle = shade(s.color, -0.2);
    g.beginPath(); g.ellipse(S * 0.6, sway * 0.3, S * 0.28, S * 0.14, -0.4, 0, Math.PI * 2); g.fill();
    // big round eyes
    g.fillStyle = "#fff";
    g.beginPath(); g.arc(S * 0.05, S * 0.05 + sway, S * 0.16, 0, Math.PI * 2); g.fill();
    g.fillStyle = "#122029";
    g.beginPath(); g.arc(S * 0.08, S * 0.05 + sway, S * 0.09, 0, Math.PI * 2); g.fill();
  }
  function drawWhale(g, s, wob) {
    const S = s.size, tw = Math.sin(wob) * S * 0.08;
    if (s.glow) {
      const gl = g.createRadialGradient(0, 0, 4, 0, 0, S * 2);
      gl.addColorStop(0, s.glow + "55"); gl.addColorStop(1, "rgba(0,0,0,0)");
      g.fillStyle = gl; g.beginPath(); g.arc(0, 0, S * 2, 0, Math.PI * 2); g.fill();
    }
    // wide two-lobe fluke
    g.fillStyle = shade(s.color, -0.2);
    g.beginPath(); g.moveTo(-S * 1.0, tw);
    g.quadraticCurveTo(-S * 1.25, tw - S * 0.12, -S * 1.55, tw - S * 0.44);
    g.quadraticCurveTo(-S * 1.28, tw - S * 0.04, -S * 1.26, tw);
    g.quadraticCurveTo(-S * 1.28, tw + S * 0.04, -S * 1.55, tw + S * 0.44);
    g.quadraticCurveTo(-S * 1.25, tw + S * 0.12, -S * 1.0, tw); g.fill();
    // vast body: blunt brow, deep jaw, tapering tailstock
    const bg2 = g.createLinearGradient(0, -S * 0.55, 0, S * 0.6);
    bg2.addColorStop(0, s.color); bg2.addColorStop(1, shade(s.color, 0.35));
    g.fillStyle = bg2;
    g.beginPath();
    g.moveTo(S * 1.05, -S * 0.12);
    g.quadraticCurveTo(S * 1.1, -S * 0.52, S * 0.35, -S * 0.55);

    else { wg.addColorStop(0, "#2fa3cf"); wg.addColorStop(1, "#0d5379"); }
    ctx.fillStyle = wg; roundRect(tx, ty, tw, th, 10); ctx.fill();

    ctx.save(); roundRect(tx, ty, tw, th, 10); ctx.clip();
    // gravel
    ctx.fillStyle = "#c9a86a";
    ctx.beginPath(); ctx.moveTo(tx, ty + th);
    for (let x = tx; x <= tx + tw; x += 14) ctx.lineTo(x, ty + th - 12 - Math.sin(x * 0.3) * 4);
    ctx.lineTo(tx + tw, ty + th); ctx.closePath(); ctx.fill();
    drawTankDecor(tx, ty, tw, th);
    // plants
    ctx.strokeStyle = "#3fae5a"; ctx.lineWidth = 6; ctx.lineCap = "round";
    for (const px of [tx + tw * 0.15, tx + tw * 0.85, tx + tw * 0.5]) {
      ctx.beginPath(); ctx.moveTo(px, ty + th - 8);
      ctx.quadraticCurveTo(px + Math.sin(px + T) * 14, ty + th - 50, px + Math.sin(T) * 8, ty + th - 94);
      ctx.stroke();
    }
    // swimmers
    for (const f of tank) {
      f.wob += dt * 3; f.x += f.vx * dt;
      const left = tx + 30, right = tx + tw - 30;
      if (f.x < left) { f.x = left; f.vx *= -1; }
      if (f.x > right) { f.x = right; f.vx *= -1; }
      drawFish(ctx, { s: f.s, x: f.x, y: ty + 30 + f.y * (th - 70), vx: f.vx, wob: f.wob }, 1);
    }
    // bubbles
    for (const b of bubbles) {
      b.y -= b.v * dt;
      if (b.y < ty + 8) { b.y = ty + th - 8; b.x = rand(tx + 10, tx + tw - 10); }
      ctx.fillStyle = "rgba(255,255,255,.28)";
      ctx.beginPath(); ctx.arc(b.x + Math.sin(b.y * .05) * b.sway, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    }
    // floating hearts (cuteness — the vault keeps a solemn dark instead)
    if (!vault) for (const ht of TANK_HEARTS) {
      ht.y -= ht.v * dt;
      if (ht.y < 0) ht.y = 1;
      const hx = tx + ht.fx * tw + Math.sin(T * 1.5 + ht.ph) * 8;
      const hy = ty + 20 + ht.y * (th - 40);
      drawHeart(hx, hy, ht.s, 0.45 + 0.3 * Math.sin(T * 3 + ht.ph));
    }
    ctx.restore();

    ctx.strokeStyle = "rgba(255,255,255,.35)"; ctx.lineWidth = 2; roundRect(tx, ty, tw, th, 10); ctx.stroke();

    const kinds = Object.keys(state.collection).length;
    const total = Object.values(state.collection).reduce((a, b) => a + b, 0);
    const locked = Object.keys(state.collection).filter(id => byId[id] && !tankAllows(byId[id])).length;
    ctx.fillStyle = "#f3ece0"; ctx.textAlign = "center"; ctx.font = "800 20px " + FONT();
    ctx.fillText(TANKS[state.tank].name, W / 2, ty + th + H * 0.115);
    ctx.fillStyle = "#c3b49c"; ctx.font = "600 12px " + FONT();
    ctx.fillText(kinds + " of " + SPECIES.length + " species  ·  " + total + " fish kept"
      + (locked ? "  ·  🔒 " + locked + " need a bigger tank" : ""), W / 2, ty + th + H * 0.145);
    if (kinds === 0) {
      ctx.fillStyle = "rgba(243,236,224,.6)"; ctx.font = "600 14px " + FONT();
      ctx.fillText("Every new species you catch swims home to here!", W / 2, ty + th / 2);
    }
    ctx.textAlign = "left";
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath(); ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
  }
  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    const t = amt < 0 ? 0 : 255, p = Math.abs(amt);
    r = Math.round((t - r) * p + r); g = Math.round((t - g) * p + g); b = Math.round((t - b) * p + b);
    return "rgb(" + r + "," + g + "," + b + ")";
  }
  function drawHeart(x, y, s, alpha) {
    ctx.save(); ctx.globalAlpha = Math.max(0, alpha); ctx.fillStyle = "#ff8fb0";
    ctx.beginPath();
    ctx.moveTo(x, y + s * 0.3);
    ctx.bezierCurveTo(x, y, x - s, y, x - s, y + s * 0.4);
    ctx.bezierCurveTo(x - s, y + s * 0.85, x, y + s * 1.05, x, y + s * 1.35);
    ctx.bezierCurveTo(x, y + s * 1.05, x + s, y + s * 0.85, x + s, y + s * 0.4);
    ctx.bezierCurveTo(x + s, y, x, y, x, y + s * 0.3);
    ctx.fill(); ctx.restore();
  }
  function drawTankDecor(tx, ty, tw, th) {
    const base = ty + th - 12;
    // treasure chest
    const cx = tx + tw * 0.2;
    ctx.fillStyle = "#7a4a24"; roundRect(cx - 22, base - 20, 44, 20, 4); ctx.fill();
    ctx.fillStyle = "#9a6338"; roundRect(cx - 22, base - 31, 44, 13, 6); ctx.fill();
    ctx.fillStyle = "#ffce4a"; ctx.fillRect(cx - 4, base - 23, 8, 11);
    ctx.fillStyle = "#ffe08a";
    for (const [dx, dy] of [[17, 2], [23, 1], [20, 6]]) { ctx.beginPath(); ctx.ellipse(cx + dx, base - dy, 4, 2.4, 0, 0, Math.PI * 2); ctx.fill(); }
    // pink coral
    const rx = tx + tw * 0.5;
    ctx.strokeStyle = "#ff9ec4"; ctx.lineWidth = 5; ctx.lineCap = "round";
    for (const a of [-0.5, 0, 0.5]) { ctx.beginPath(); ctx.moveTo(rx, base); ctx.quadraticCurveTo(rx + a * 30, base - 24, rx + a * 46, base - 42); ctx.stroke(); }
    // little shell
    const shx = tx + tw * 0.8;
    ctx.fillStyle = "#ffd3e2"; ctx.beginPath(); ctx.arc(shx, base, 13, Math.PI, 0); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "#f5a6c8"; ctx.lineWidth = 1.5;
    for (const a of [-0.7, -0.25, 0.25, 0.7]) { ctx.beginPath(); ctx.moveTo(shx, base); ctx.lineTo(shx + Math.sin(a) * 13, base - Math.cos(a) * 13); ctx.stroke(); }
  }

  // ---------- loop ----------
  let last = performance.now(), T = 0, bubbleAcc = 0;
  function frame(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;
    T += dt;
    ctx.clearRect(0, 0, W, H);

    if (state.view === "room") { drawRoom(dt); requestAnimationFrame(frame); return; }

    // camera rides the line down, then drifts home
    const camMax = Math.max(0, surfaceY() + worldDepth() + 30 - H);
    const camT = hook.state === "idle" ? 0 : Math.max(0, Math.min(hook.y - H * 0.55, camMax));
    cam += (camT - cam) * Math.min(1, dt * 4.5);
    if (Math.abs(camT - cam) < 0.5) cam = camT;
    ctx.save(); ctx.translate(0, -Math.round(cam));

    drawSky();
    drawWater();

    bubbleAcc += dt;
    for (const b of bubbles) {
      b.y -= b.v * dt;
      if (b.y < surfaceY()) { b.y = surfaceY() + worldDepth(); b.x = rand(0, W); }
      ctx.fillStyle = "rgba(255,255,255,.14)";
      ctx.beginPath(); ctx.arc(b.x + Math.sin(b.y * .05) * b.sway, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    }

    ensureFish();
    const reach = maxDepthY();
    // predators: one hunter at a time — it notices (a beat you can read),
    // then commits to a straight lunge you can dodge by steering away
    const prey = hook.caught.length > 0 && hook.state !== "idle";
    if (stealCd > 0) stealCd -= dt;
    if (prowler && (prowler.caught || prowler.flee > 0 || !prowler.aggro)) prowler = null;
    const breakOff = (f) => {
      f.aggro = null; f.prowl = false;
      f.flee = 2.2; f.vx = (f.x > hook.x ? 1 : -1) * Math.max(46, Math.abs(f.vx));
      if (prowler === f) prowler = null;
    };
    for (const f of fish) {
      f.wob += dt * 3.2;
      if (f.caught) continue;
      if (f.flee > 0) { f.flee -= dt; f.prowl = false; f.x += f.vx * dt * 3.2; continue; }
      if (f.aggro) {
        if (!prey) { breakOff(f); f.flee = 0.4; continue; } // haul landed — it loses interest
        f.aggro.t += dt;
        f.prowl = true;
        if (f.aggro.phase === "notice") {
          // turn toward the hook and coil — your window to move
          f.vx = (hook.x >= f.x ? 1 : -1) * Math.max(14, Math.abs(f.vx) * 0.4);
          f.x += f.vx * dt * 0.3;
          if (f.aggro.t > 0.55) {
            const dx = hook.x - f.x, dy = hook.y - f.y, d = Math.hypot(dx, dy) || 1;
            const sp = 240 + (f.s.big || 1) * 35;
            f.aggro = { phase: "lunge", t: 0, vx: dx / d * sp, vy: dy / d * sp };
          }
        } else {
          f.x += f.aggro.vx * dt; f.y += f.aggro.vy * dt;
          f.vx = f.aggro.vx;
          const d = Math.hypot(hook.x - f.x, hook.y - f.y);
          if (d < f.s.size * 0.9 + 14) {
            const stolen = hook.caught.pop();
            if (stolen) {
              fish = fish.filter(x => x !== stolen);
              floatText(hook.x, hook.y - 24, f.s.name + " stole your " + stolen.s.name + "!", "#ff6a6a");
              Snd.blip("bite");
              stolenThisCast = true;
              Quests.event("stolen");
              syncHud();
            }
            stealCd = 4.5;
            breakOff(f);
          } else if (f.aggro.t > 1.3) breakOff(f); // lunge missed — it gives up
        }
        continue;
      }
      f.prowl = false;
      // the nervous ones bolt when the hook comes close
      if (f.dart > 0) { f.dart -= dt; f.x += f.dvx * dt; f.y += f.dvy * dt * 0.4; f.vx = f.dvx * 0.4; continue; }
      if (f.s.shy && hook.state !== "idle") {
        const sdx = f.x - hook.x, sdy = f.y - hook.y;
        if (sdx * sdx + sdy * sdy < 6400) {
          f.dart = 0.5; f.dvx = (sdx >= 0 ? 1 : -1) * 135; f.dvy = (sdy >= 0 ? 1 : -1) * 60;
        }
      }
      f.x += f.vx * dt; f.y += Math.sin(f.wob) * 0.25;
      // acquisition: nearest calm predator inside a real hunting radius
      if (prey && !prowler && f.s.pred && stealCd <= 0) {
        const dx = hook.x - f.x, dy = hook.y - f.y;
        if (dx * dx + dy * dy < 280 * 280) { prowler = f; f.aggro = { phase: "notice", t: 0 }; }
      }
    }
    for (const f of fish) if (!f.caught) f.y = Math.max(surfaceY() + 10, Math.min(surfaceY() + worldDepth() - 8, f.y));
    fish = fish.filter(f => f.x > -60 && f.x < W + 60);
    if (prowler && !fish.includes(prowler)) prowler = null;

    hook.x += (hook.tx - hook.x) * Math.min(1, dt * 10);
    if (hook.state === "dropping") {
      hook.y += DROP_SPEED * dt;
      tryCatch();
      if (hook.y >= reach || hook.caught.length >= catchLimit()) hook.state = "reeling";
    } else if (hook.state === "reeling") {
      hook.y -= reelSpeed() * dt;
      tryCatch();
      if (hook.y <= surfaceY()) { hook.y = surfaceY(); resolveCatch(); }
    } else { hook.y = surfaceY(); }

    for (const f of fish) { if (f.caught) continue; drawFish(ctx, f, f.y > reach + 4 ? 0.32 : 1); }
    for (const f of hook.caught) { f.x = hook.x + f.ox; f.y = hook.y + f.oy; drawFish(ctx, f, 1); }

    drawBoat();

    for (let i = floats.length - 1; i >= 0; i--) {
      const t = floats[i]; t.y -= dt * 34; t.life -= dt * 0.9;
      if (t.life <= 0) { floats.splice(i, 1); continue; }
      ctx.globalAlpha = Math.max(0, t.life); ctx.fillStyle = t.color;
      ctx.font = "800 15px " + FONT(); ctx.textAlign = "center";
      ctx.fillText(t.txt, t.x, t.y); ctx.globalAlpha = 1; ctx.textAlign = "left";
    }

    ctx.restore(); // camera

    requestAnimationFrame(frame);
  }

  const muteBtn = el("mute");
  muteBtn.textContent = state.muted ? "🔇" : "🔊";
  muteBtn.addEventListener("click", () => {
    Snd.setMuted(!state.muted);
    muteBtn.textContent = state.muted ? "🔇" : "🔊";
    save();
  });

  el("quest").addEventListener("click", openNote);
  el("note-close").addEventListener("click", () => el("note-overlay").classList.remove("open"));
  el("note-overlay").addEventListener("click", (e) => { if (e.target === el("note-overlay")) el("note-overlay").classList.remove("open"); });

  window.__dc = { SPECIES, drawFish, state }; // debug handle for tests
  if (state._rescanQuests) { delete state._rescanQuests; Quests.rescan(); save(); }
  syncHud(); syncBrand(); setView("fish"); Quests.check();
  if (state.qi === 0) setTimeout(openNote, 900); // the journal falls open on a brand-new game
  requestAnimationFrame(frame);
})();
</script>
